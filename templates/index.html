<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live City News Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
            background: #0f172a;
        }

        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            opacity: 0.6;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 850px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            margin: 40px auto;
        }

        h1 {
            font-size: 2.6rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            font-weight: 700;
        }

        p.subtitle {
            margin-bottom: 30px;
            color: #cbd5e1;
            font-size: 1.1rem;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
        }

        #city-input {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        #city-input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        #city-input::placeholder {
            color: #94a3b8;
        }

        #search-btn {
            padding: 16px 32px;
            border: none;
            border-radius: 10px;
            background: #0284c7;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(2, 132, 199, 0.4);
        }

        #search-btn:hover {
            background: #0369a1;
            transform: translateY(-1px);
        }

        .news-results {
            max-height: 550px;
            overflow-y: auto;
            text-align: left;
            padding-right: 12px;
        }

        .news-results::-webkit-scrollbar {
            width: 8px;
        }
        .news-results::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .news-results::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .news-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border-left: 5px solid #38bdf8;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
        }

        .news-card:hover {
            transform: scale(1.01);
        }

        .news-meta {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .news-card h3 {
            margin-bottom: 12px;
        }

        .news-card h3 a {
            color: #f8fafc;
            text-decoration: none;
            font-size: 1.35rem;
            line-height: 1.4;
            transition: color 0.2s ease;
        }

        .news-card h3 a:hover {
            color: #38bdf8;
        }

        .news-card img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 8px;
            margin: 16px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .news-card p {
            color: #cbd5e1;
            line-height: 1.6;
            font-size: 1rem;
        }

        .status-msg {
            text-align: center;
            font-size: 1.1rem;
            padding: 20px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-digital-technology-background-9121-large.mp4" type="video/mp4">
    </video>

    <div class="app-container">
        <h1>📰 Live City News Predictor</h1>
        <p class="subtitle">Enter any city name to fetch real-time live news updates</p>
        
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name (e.g., Delhi, Mumbai, London)...">
            <button id="search-btn">Search News</button>
        </div>

        <div id="news-results" class="news-results">
            <div class="status-msg">Your live news feed will appear here...</div>
        </div>
    </div>

    <script>
        document.getElementById('search-btn').addEventListener('click', fetchNews);
        
        document.getElementById('city-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fetchNews();
            }
        });

        function fetchNews() {
            const city = document.getElementById('city-input').value.trim();
            const newsResults = document.getElementById('news-results');

            if (!city) {
                alert('Please enter a city name!');
                return;
            }

            newsResults.innerHTML = '<div class="status-msg">🔄 Fetching live updates from Flask Backend...</div>';

            const url = window.location.origin + '/get_news?city=' + encodeURIComponent(city);

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok: ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    newsResults.innerHTML = '';

                    if (data.status === 'success' && data.articles && data.articles.length > 0) {
                        data.articles.forEach(article => {
                            const card = document.createElement('div');
                            card.className = 'news-card';

                            const imgTag = article.urlToImage ? `<img src="${article.urlToImage}" alt="news image" onerror="this.style.display='none'">` : '';
                            const pubDate = article.publishedAt ? article.publishedAt.substring(0, 10) : 'Recent';

                            card.innerHTML = `
                                <div class="news-meta">
                                    <span>📍 Source: ${article.source.name || 'Unknown'}</span>
                                    <span>📅 ${pubDate}</span>
                                </div>
                                <h3><a href="${article.url}" target="_blank">${article.title}</a></h3>
                                ${imgTag}
                                <p>${article.description || 'No description available for this live update.'}</p>
                            `;
                            newsResults.appendChild(card);
                        });
                    } else {
                        newsResults.innerHTML = `<div class="status-msg" style="color: #f87171;">❌ No live news found for "${city}". Try another major city.</div>`;
                    }
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                    newsResults.innerHTML = '<div class="status-msg" style="color: #f87171;">⚠️ Failed to connect to backend server. Ensure app.py is running.</div>';
                });
        }
    </script>
</body>
</html>
